<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Vault</title>
<link rel="stylesheet" href="tokens.css">
<style>
:root {
  --draft:       var(--dimmer);
  --en-discusion:#c9a43a;
  --en-progreso: #3b7dd8;
  --en-revision: #d08030;
  --publicado:   var(--accent);
  --archivado:   var(--border2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--dim);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.6;
  padding: 48px 32px 80px;
}

.wrap { max-width: 1200px; margin: 0 auto; }

.hdr {
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
  margin-bottom: 32px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.hdr h1 { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: .08em; text-transform: uppercase; }
.hdr p  { font-size: 11px; color: var(--dim); }

.filters {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.filter-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--dim);
  padding: 6px 16px;
  font-family: var(--sans);
  font-size: 11px;
  cursor: pointer;
  letter-spacing: .04em;
  border-radius: var(--r-btn);
  transition: all .15s;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

.domain-group { margin-bottom: 28px; }
.domain-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--dimmer);
  margin-bottom: 8px;
  font-family: var(--mono);
}

.doc-card {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  padding: 14px 20px;
  margin-bottom: 4px;
  text-decoration: none;
  color: inherit;
  border-radius: var(--r-card);
  transition: border-color .15s, background .15s;
}
.doc-card:hover { background: var(--surface2); border-color: var(--border2); }
.doc-card.status-draft        { border-left-color: var(--draft); }
.doc-card.status-en-discusion { border-left-color: #c9a43a; }
.doc-card.status-en-progreso  { border-left-color: #3b7dd8; }
.doc-card.status-en-revision  { border-left-color: #d08030; }
.doc-card.status-publicado    { border-left-color: var(--accent); }
.doc-card.status-archivado    { opacity: .4; border-left-color: var(--border2); }

.doc-title { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 3px; }
.doc-desc  { font-size: 11px; color: var(--dim); }
.doc-meta  { font-size: 10px; color: var(--dimmer); margin-top: 6px; font-family: var(--mono); }

.doc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  border: 1px solid;
  white-space: nowrap;
  border-radius: var(--r-sm);
}
.badge-draft        { color: #666;    border-color: var(--draft); }
.badge-en-discusion { color: #c9a43a; border-color: #c9a43a; }
.badge-en-progreso  { color: #5a9de8; border-color: #3b7dd8; }
.badge-en-revision  { color: #d08030; border-color: #d08030; }
.badge-publicado    { color: var(--accent); border-color: var(--accent); }
.badge-archivado    { color: #444; border-color: var(--border2); }

.doc-author { font-size: 10px; color: var(--dimmer); font-family: var(--mono); }

.empty { color: var(--dimmer); font-size: 12px; padding: 24px 0; }

.legend {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 10px;
  color: var(--dim);
}
.legend-item { display: flex; align-items: center; gap: 6px; }

.add-hint {
  margin-top: 24px;
  padding: 14px 16px;
  border: 1px dashed var(--border2);
  border-radius: var(--r-sm);
  font-size: 11px;
  color: var(--dimmer);
  line-height: 1.8;
}
.add-hint code { color: var(--accent); background: var(--surface); padding: 1px 6px; border: 1px solid var(--border2); border-radius: 4px; font-family: var(--mono); font-size: 10px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <h1>Dev Vault</h1>
    <p>diagramas técnicos · flujos · decisiones de arquitectura</p>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">todos</button>
  </div>

  <div id="docs-container"></div>

  <div class="legend">
    <div class="legend-item"><span class="badge badge-draft">draft</span> borrador inicial</div>
    <div class="legend-item"><span class="badge badge-en-discusion">en discusión</span> decisiones abiertas</div>
    <div class="legend-item"><span class="badge badge-en-progreso">en progreso</span> desarrollo activo</div>
    <div class="legend-item"><span class="badge badge-en-revision">en revisión</span> listo para review</div>
    <div class="legend-item"><span class="badge badge-publicado">publicado</span> aprobado</div>
  </div>

  <div class="add-hint">
    Para agregar un doc: subí el <code>.html</code> al repo, actualizá <code>manifest.json</code> y hacé push a <code>main</code>.
  </div>

</div>

<script>
let currentFilter = 'all';

fetch('manifest.json')
  .then(r => r.json())
  .then(docs => {
    buildFilters(docs);
    render(docs);
  });

function buildFilters(docs) {
  const domains = [...new Set(docs.map(d => d.domain))];
  const container = document.getElementById('filters');
  domains.forEach(domain => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = domain;
    btn.textContent = domain.toLowerCase();
    btn.onclick = () => setFilter(domain, btn);
    container.appendChild(btn);
  });
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetch('manifest.json').then(r => r.json()).then(render);
}

function render(docs) {
  const filtered = currentFilter === 'all' ? docs : docs.filter(d => d.domain === currentFilter);
  const container = document.getElementById('docs-container');

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">— sin documentos</div>';
    return;
  }

  const byDomain = filtered.reduce((acc, d) => {
    (acc[d.domain] = acc[d.domain] || []).push(d);
    return acc;
  }, {});

  container.innerHTML = Object.entries(byDomain).map(([domain, items]) => `
    <div class="domain-group">
      <div class="domain-label">${domain}</div>
      ${items.map(doc => `
        <a class="doc-card status-${doc.status}" href="${doc.file}">
          <div>
            <div class="doc-title">${doc.title}</div>
            <div class="doc-desc">${doc.description}</div>
            <div class="doc-meta">${doc.updated}</div>
          </div>
          <div class="doc-right">
            <span class="badge badge-${doc.status}">${doc.status.replace('-', ' ')}</span>
            <span class="doc-author">${doc.author}</span>
          </div>
        </a>`).join('')}
    </div>`).join('');
}
</script>
</body>
</html>
